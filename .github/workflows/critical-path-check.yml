name: Critical Path Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect critical-path files
        id: detect
        run: |
          set -e
          # Keep in sync with CLAUDE.md > "CRITICAL PATHS" and .github/CODEOWNERS.
          paths=(
            "packages/babylon-tbv-rust-wasm/src/index.ts"
            "packages/babylon-ts-sdk/src/tbv/core/utils/utxo/selectUtxos.ts"
            "services/vault/src/utils/fee/peginFee.ts"
            "packages/babylon-ts-sdk/src/tbv/core/primitives/psbt/payout.ts"
            "services/vault/src/hooks/deposit/depositFlowSteps/payoutSigning.ts"
            "services/vault/src/services/wots/"
            "services/vault/src/services/vault/vaultActivationService.ts"
            "packages/babylon-ts-sdk/src/tbv/integrations/aave/utils/vaultSplit.ts"
            "packages/babylon-ts-sdk/src/tbv/core/utils/signing.ts"
          )

          git fetch origin main --depth=1 || true
          changed=$(git diff --name-only "origin/${GITHUB_BASE_REF}...HEAD")

          matched=()
          for f in $changed; do
            for p in "${paths[@]}"; do
              case "$f" in
                "$p"|"$p"*) matched+=("$f"); break ;;
              esac
            done
          done

          if [ ${#matched[@]} -gt 0 ]; then
            printf '%s\n' "${matched[@]}" | sort -u > matched.txt
            echo "matched=true" >> "$GITHUB_OUTPUT"
            echo "Matched critical-path files:"
            cat matched.txt
          else
            echo "matched=false" >> "$GITHUB_OUTPUT"
            echo "No critical-path files touched."
          fi

      - name: Comment on PR
        if: steps.detect.outputs.matched == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const matched = fs.readFileSync('matched.txt', 'utf8').trim().split('\n');
            const marker = '<!-- critical-path-check -->';
            const body = [
              marker,
              '### Critical path PR',
              '',
              'This PR touches files defined as critical in [CLAUDE.md](../blob/main/CLAUDE.md#critical-paths--human-review-required). Changes here handle irreversible value movement - silent bugs produce wrong BTC amounts.',
              '',
              '**Paths touched:**',
              ...matched.map(m => `- \`${m}\``),
              '',
              '**Required before merge:**',
              '- Two code-owner approvals',
              '- Author can walk every changed line without an AI assistant open',
              '- Per-path rule in CLAUDE.md is satisfied',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => (c.body || '').includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body,
              });
            }

            try {
              await github.rest.issues.addLabels({
                ...context.repo,
                issue_number: context.issue.number,
                labels: ['critical-path'],
              });
            } catch (err) {
              core.warning(`Could not add 'critical-path' label: ${err.message}. Create the label in repo settings to enable auto-labelling.`);
            }
