name: Build and Release in Mono Repo

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to release RC for'
        required: true
        type: choice
        options:
          - '@babylonlabs-io/ts-sdk'
          - '@babylonlabs-io/babylon-tbv-rust-wasm'
      preid:
        description: 'Pre-release identifier (rc, alpha, beta)'
        required: true
        default: 'rc'
        type: string

jobs:
  build_and_release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write # needed for provenance data generation
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.2.0'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Corepack
        run: npm install -g corepack && corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Single Version Policy
        if: github.event_name == 'push'
        run: |-
          # Exit immediately if any command in the script fails
          set -e

          if pnpm exec syncpack list-mismatches; then
            echo "✅ Dependency versions are aligned"
          else
            # Add an annotation to the Checks tab with a helpful hint
            echo "::error title=Dependency mismatch::Run 'pnpm exec syncpack list-mismatches' locally (and 'pnpm exec syncpack fix-mismatches' to auto-fix)." >&2
            exit 1
          fi

      - name: Build all
        run: pnpm exec nx run-many --target=build --all

      - name: Lint all
        run: pnpm exec nx run-many --target=lint --all

      - name: Test all
        run: pnpm exec nx run-many --target=test --all

      - name: Release changed packages
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          pnpm run ci:release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Bump RC version
        if: github.event_name == 'workflow_dispatch'
        env:
          PKG: ${{ inputs.package }}
          PREID: ${{ inputs.preid }}
        run: |
          pnpm exec nx release version \
            --projects="$PKG" \
            --preid="$PREID" \
            --specifier=prerelease \
            --git-commit=false \
            --git-tag=false

      - name: Publish RC to npm
        if: github.event_name == 'workflow_dispatch'
        env:
          PKG: ${{ inputs.package }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: |
          pnpm exec nx release publish \
            --projects="$PKG" \
            --tag=next
